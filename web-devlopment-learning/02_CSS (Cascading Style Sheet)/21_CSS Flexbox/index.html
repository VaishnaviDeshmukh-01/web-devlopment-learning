<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flexbox</title>
    <style>
        .container{
            border: 2px solid red;
            display: flex;
            height: 80vh;
            /* justify-content: center; */
            /* align-items: center; */
            /* align-content: center; */
            /* align-content: start; */
            /* flex-direction: column; */
            /* flex-direction: column-reverse; */
            /* flex-direction: row; */
            /* flex-wrap: wrap; */
            flex-flow: row wrap;
            /* flex-wrap: wrap-reverse; */
            /* gap: 20px; */
            /* row-gap: 30px; */
            /* column-gap: 20px; */
            gap: 10px 5px
        }
        .items{
            /* flex-grow: 1; */
            height: 32px;
            width: 32px;
            border: 2px solid black;
            /* margin: 4px; */
            background-color: blueviolet;
        } 
        .order-1{
            order: 1;
        }
        .order-2{
            order: 2;
        }
        .order-3{
            order: 3;
        }
        .item1{
            /* flex-grow: 24; */
            /* flex-shrink: 2; */
            align-self: flex-end;
        }
    </style>
</head>

    <main>
        <div class="container">
            <div class="items item1"></div>
            <div class="items"></div>
            <div class="items"></div>

            <div class="items"></div>

            <div class="items"></div>
            <div class="items"></div>

        </div>
    </main>

</html>
