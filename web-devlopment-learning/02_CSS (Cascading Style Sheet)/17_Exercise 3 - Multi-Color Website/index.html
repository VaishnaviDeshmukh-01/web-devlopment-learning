<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sample Navbar</title>
    <style>
        /* Reset default margin */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar container */
        .navbar {
            background-color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        /* Logo */
        .navbar .logo { 
            color: whitesmoke;
            font-size: 20px;
            font-weight: bold;
            padding: 14ptx 0;
        }

        /* Nav links container */
        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        /* Individual links */
        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: whitesmoke;
            padding: 14px 0;
            display: inline-block;
            transition: color 0.3s ease;
        }

        /* Hover effect */
        .nav-links a:hover {
            color: #00bcd4;
        }

        /* Responsive (Mobile) */
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-links {
                flex-direction: column;
                width: 100%;
            }

            .nav-links li {
                margin: 0;
                width: 100%;
            }

            .nav-links a {
                width: 100%;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">MyWebsite</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

</body>
</html>
