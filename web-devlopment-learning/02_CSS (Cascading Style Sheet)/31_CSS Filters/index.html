<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters</title>
    <style>
        /* img{
            filter: blur(2px);

        } */

        .img1{
            filter: brightness(2) contrast(2);
        }
        .img2{
            /* filter: invert(0.2); */
            filter: opacity(2);
        }
        .img3{
            /* filter: grayscale(20); */
            filter: sepia(100);
        }
    </style>
</head>
<body>
   <div class="container">
    <img class="img1" src="https://img.freepik.com/free-photo/positive-woman-cowboy-hat-walking-bakota-area_7502-7553.jpg?semt=ais_rp_progressive&w=740&q=80" alt="">
    <img class="img2" src="https://images.moneycontrol.com/static-mcnews/2025/02/20250219052915_solo-travel.png?impolicy=website&width=1600&height=900" alt="">
    <img class="img3" src="https://c.ndtvimg.com/2024-10/prtug85o_solo-travel_625x300_30_October_24.jpg?im=FeatureCrop,algorithm=dnn,width=1200,height=738" alt="">
   </div> 
</body>
</html>
