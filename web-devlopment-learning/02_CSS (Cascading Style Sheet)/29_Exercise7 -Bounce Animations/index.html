<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Animations</title>
    <style>
        .container{
            position: relative;
            height: 80vh;
            width: 80vw;
            background-color: burlywood;
        }
        .box{
            height: 121px;
            width: 121px;
            background-color: rebeccapurple;
            border-radius: 1000px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: bounce 3s linear infinite, bounce1 1s ease-out infinite alternate;
        }
        @keyframes bounce {
            from{
                left: 0;
            }
            to{
                left: 100%;
            }
        }
        @keyframes bounce1 {
            from{
                bottom: 0;
                /* transform: translateY(200px) translateX(100px) */
                /* transform: translateY(-200px) translateX(100px); */
            }
            to{
                bottom: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
</body>
</html>
