<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Design</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
        }
        header{
            position: sticky;
            top: 0px;
        }
        nav{
            background-color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0px 20px;
           
        }
        .logo{
            font-size: 20px;
            font-weight: bold;
            color: white;
            padding: 14px 0;
        }
        nav ul{
            display: flex;
        }
        nav ul li{
            margin-left: 20px;
            list-style-type: none;
        }
        nav ul li a{
            text-decoration: none;
            color: white;
            padding: 14px 0;
            display: inline-block;
        }
        nav ul li a:hover{
            color: #00bcd4;
        }
        .boxes{
            border: 2px solid black;
            height: 500px;
            width: 1300px;
            margin: 20px;
           padding: 10px;
           display: flex;
           justify-content: center;
           background-color: green;
        }
        .box1{
            border: 2px solid black;
            margin: 30px;
            padding: 10px;
            height: 400px;
            width: 400px;
            background-color: palevioletred;
        }
        .box2{
            border: 2px solid black;
            margin: 30px;
            padding: 10px;
            height: 400px;
            width: 400px;
            background-color: skyblue;
        }

        .capsule{
            border: 2px solid black;
            border-radius: 40px;
            height: 100px;
            text-align: center;
            padding-top: 70px;
            font-size: 30px;
            margin: 20px;

        }
        footer{
            border: 2px solid black;
            height: 40px;
            text-align: center;
            padding-top: 19px;
        }
        .circle{
            height: 62px;
            width: 62px;
            background: orange;
            border-radius: 100px;
            bottom: 0px;
            right: 5px;
            position: fixed ;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">MyWebsite</div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="boxes">
            <div class="box box1"></div>
            <div class="box box2"></div>
        </div>
        <div class="capsule">Welcome to Web Devlopment Journey</div>
        <div class="circle"></div>
    </main>
    <footer>Copyright &copy;2026 | All Rights Reserved.</footer>

</body>
</html>
