*{

/* Page background */
body{
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* Heading */
h1{

    color:white;
}

/* Form container */
form{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Form fields spacing */
form div{
    margin-bottom:15px;
}

/* Labels */
label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

/* Inputs and textarea */
input, textarea{
    width:100%;
    padding:8px;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:14px;
}

/* Textarea */
textarea{
    resize:none;
}

/* Button */
button{
    width:100%;
    padding:10px;
    background:#ff6b35;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

/* Button hover */
button:hover{
    background:#e85a2a;
}
