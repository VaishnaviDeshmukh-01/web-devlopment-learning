<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Martel+Sans:wght@200;300;400;600;700;800;900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        *{
            margin: 0;
            padding: 0;
        }
        body{
            background-color: #e6f2ff;
            font-family: 'poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            
        }
        .container h1{
            color: rgb(68, 70, 70);
        }
        .container{
            width: 90%;
            background-color: white;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border: 2px solid black;
            border-radius: 20px;
            max-width: 400px;
            
        }
        .container label{
            display: block;
            margin-top: 10px;
            font-weight: 500;
        }
        .container input{
           width: 100%;
           padding: 8px;
           margin: 10px 0;
        }
        .container button{
            background-color: skyblue;
            border-radius: 20px;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .container button:hover{
            background-color: rgb(20, 183, 248);
        }
    </style>
</head>
<body>
    <form method="post">

        <div class="container">
        <h1>CampusConnect Login</h1>
        <label for="username">UserName:</label>
        <input type="text" id="username" name="username" placeholder="Enter Your Username" required>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter Your Password">
        <br>
        <button>Login</button>
    </div>
</form>
</body>
</html>
